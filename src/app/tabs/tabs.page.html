<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="scanner" [attr.aria-label]="'Escáner'">
      <ion-icon name="scan-outline" />
      <ion-label>Escáner</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="catalog" [attr.aria-label]="'Catálogo'">
      <ion-icon name="search-outline" />
      <ion-label>Catálogo</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="quote" [attr.aria-label]="'Cotización'">
      <ion-icon name="document-text-outline" />
      <ion-label>Cotización</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="account" [attr.aria-label]="'Cuenta'">
      <ion-icon name="person-outline" />
      <ion-label>Cuenta</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
